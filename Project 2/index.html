<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hero">

        <div class="selector">
            <div id="selectField">
                <p id="selectText">Select Social Media</p>
                <img src="./Images/dd.png" alt="" id="arrowIcon">
            </div>

            <ul id="list"  class="hide">
                <li class="options"><img src="./Images/facebook.webp" alt="facebook"><p>Facebook</p></li>
                <li class="options"><img src="./Images/whatsapp.webp" alt="Whatsapp"><p>Whatsapp</p></li>
                <li class="options"><img src="./Images/ytt.png" alt="Youtube"><p>Youtube</p></li>
                <li class="options"><img src="./Images/twitters.png" alt="Twitter"><p>Twitter</p></li>
                <li class="options"><img src="./Images/pinetest.webp" alt="Pinterest"><p>Pinterest</p></li>
                <li class="options"><img src="./Images/instagram.png" alt="Instagram"><p>Instagram</p></li>
            </ul>
        </div>
  </div>  

  <script src="main.js"></script>
</body>
</html>
